syntax = "proto3";

package aggregator.v1;

option go_package = "aggregator/v1";

service AnalysisService {
  rpc ClassifyProblems(ClassifyProblemsRequest) returns (ClassifyProblemsResponse);
  rpc ClusterProblems(ClusterProblemsRequest) returns (ClusterProblemsResponse);
  rpc DetectTrends(DetectTrendsRequest) returns (DetectTrendsResponse);
  rpc SummarizeCluster(SummarizeClusterRequest) returns (SummarizeClusterResponse);
  rpc EmbedProblems(EmbedProblemsRequest) returns (EmbedProblemsResponse);
}

message ProblemInput {
  string id = 1;
  string title = 2;
  string body = 3;
  repeated string tags = 4;
}

message ClassifyProblemsRequest {
  repeated ProblemInput problems = 1;
}

message Classification {
  string problem_id = 1;
  string category = 2;
  repeated string subcategories = 3;
  float confidence = 4;
}

message ClassifyProblemsResponse {
  repeated Classification classifications = 1;
}

message ClusterProblemsRequest {
  int32 min_cluster_size = 1;
}

message ClusterResult {
  string label = 1;
  repeated string problem_ids = 2;
  float cohesion_score = 3;
}

message ClusterProblemsResponse {
  repeated ClusterResult clusters = 1;
}

message DetectTrendsRequest {
  int32 window_days = 1;
}

message TrendResult {
  string cluster_id = 1;
  string label = 2;
  int32 problem_count = 3;
  float growth_rate = 4;
}

message DetectTrendsResponse {
  repeated TrendResult trends = 1;
}

message SummarizeClusterRequest {
  string cluster_id = 1;
  repeated ProblemInput problems = 2;
}

message SummarizeClusterResponse {
  string summary = 1;
  repeated string key_themes = 2;
  repeated string common_solutions = 3;
}

message EmbedProblemsRequest {
  repeated ProblemInput problems = 1;
}

message EmbedResult {
  string problem_id = 1;
  repeated float embedding = 2;
}

message EmbedProblemsResponse {
  repeated EmbedResult embeddings = 1;
}
