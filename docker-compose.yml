services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-aggregator-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./go-service/migrations/001_initial.up.sql:/docker-entrypoint-initdb.d/001_initial.up.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  python-service:
    build: ./python-service
    container_name: ai-aggregator-python
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GRPC_PORT: 50052
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy

  go-api:
    build:
      context: ./go-service
      target: api
    container_name: ai-aggregator-api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      PYTHON_GRPC_ADDR: python-service:50052
      GO_API_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      python-service:
        condition: service_started

  go-crawler:
    build:
      context: ./go-service
      target: crawler
    container_name: ai-aggregator-crawler
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      PYTHON_GRPC_ADDR: python-service:50052
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GO_CRAWLER_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      python-service:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: ai-aggregator-frontend
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: http://go-api:8080/graphql
      NEXT_PUBLIC_GRAPHQL_WS_URL: ws://go-api:8080/graphql
    ports:
      - "3000:3000"
    depends_on:
      - go-api

volumes:
  pgdata:
